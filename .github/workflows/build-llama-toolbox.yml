name: Build and Push llama.cpp Toolbox

on:
  workflow_dispatch:

jobs:
  build-toolbox:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rocm_version: ["6.4.4", "7.2.1"]
    
    steps:
      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune --all --force

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Llama.cpp Toolbox Image
        uses: docker/build-push-action@v5
        with:
          context: ./llama.cpp/
          file: ./llama.cpp/toolbox.llama.Dockerfile
          push: true
          tags: docker.io/kyuz0/llamacpp-toolbox-gfx900:rocm-${{ matrix.rocm_version }}
          build-args: |
            ROCM_VERSION=${{ matrix.rocm_version }}
            ROCM_DOCKER_ARCH=gfx900
